spring.datasource.url=jdbc:mysql://localhost:3306/coupons?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=pass1
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

## SESSION PROPERTIES
# MAX inactive interval in minutes
session.max.inactive.interval=30
# Time interval to check expired session in seconds
session.remove.expired.period=20

spring.jackson.date-format=(yyyy-MM-dd)

## MULTIPART
# Enable multipart ulpoads
spring.servlet.multipart.enabled=true
# Threshold after which files are written to disk
spring.servlet.multipart.file-size-threshold=2KB
# MAX file size
spring.servlet.multipart.max-file-size=1MB
# MAX request size
spring.servlet.multipart.max-request-size=10MB

## FILE STORAGE PROPERTIES
file.upload-dir=src/main/resources/static/assets
